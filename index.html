<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ranking Manager Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.page{display:none}
.page.active{display:block}
nav{display:flex;gap:10px;flex-wrap:wrap;padding:15px;background:#2563eb}
nav button{background:#fff;color:#2563eb}
.container{padding:20px}
</style>
</head>
<body>

<div id="loginPage" class="page active">
<div class="login-card">
<h1>🏆 Ranking Manager</h1>
<input id="email" type="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button id="loginBtn">Iniciar sesión</button>
<p id="msg"></p>
</div>
</div>

<div id="appPage" class="page">

<nav>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('registro')">Registro</button>
<button onclick="mostrar('usuarios')">Usuarios</button>
<button onclick="mostrar('ranking')">Ranking</button>
</nav>

<div class="container">

<section id="dashboard" class="vista">
<h2>Dashboard</h2>
<p>Bienvenido a Ranking Manager.</p>
</section>

<section id="registro" class="vista" style="display:none">
<h2>Registrar puntos</h2>
<p>Aquí irá el formulario de registro.</p>
</section>

<section id="usuarios" class="vista" style="display:none">
<h2>Usuarios</h2>
<p>Aquí irá la administración de usuarios.</p>
</section>

<section id="ranking" class="vista" style="display:none">
<h2>Ranking</h2>
<p>Aquí irá el ranking por rango de fechas.</p>
</section>

</div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
function mostrar(id){
 document.querySelectorAll('.vista').forEach(v=>v.style.display='none');
 document.getElementById(id).style.display='block';
}
</script>

</body>
</html>
